name: Docker Build and Push

on:
    push:
        tags:
            - 'v*'

jobs:
    build:
        name: Build (${{ matrix.platform }})
        runs-on: ${{ matrix.runs-on }}
        timeout-minutes: 10

        strategy:
            matrix:
                include:
                    - platform: linux/amd64
                      runs-on: ubuntu-latest
                      suffix: amd64
                    - platform: linux/arm64
                      runs-on: ubuntu-24.04-arm
                      suffix: arm64

        permissions:
            contents: read
            packages: write

        steps:
            - name: Checkout code
              uses: actions/checkout@v6
              with:
                submodules: recursive
                token: ${{ secrets.PAT_TOKEN }}

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v4

            - name: Log in to Docker Hub
              uses: docker/login-action@v4
              with:
                  username: ${{ secrets.DOCKERHUB_USERNAME }}
                  password: ${{ secrets.DOCKERHUB_TOKEN }}

            - name: Log in to GitHub Container Registry
              uses: docker/login-action@v4
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Extract metadata for Docker
              id: meta
              uses: docker/metadata-action@v6
              with:
                  images: |
                      alexazhou/gt_ai_gateway
                      ghcr.io/${{ github.repository }}
                  flavor: |
                      latest=false
                      suffix=-${{ matrix.suffix }}
                  tags: |
                      type=semver,pattern={{version}}
                      type=semver,pattern={{major}}.{{minor}}
                      type=ref,event=branch
                      type=sha,prefix=
                      type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/master' }}

            - name: Build and push Docker image (platform-specific)
              uses: docker/build-push-action@v7
              with:
                  context: .
                  push: true
                  tags: ${{ steps.meta.outputs.tags }}
                  labels: ${{ steps.meta.outputs.labels }}
                  cache-from: type=gha
                  cache-to: type=gha,mode=max
                  platforms: ${{ matrix.platform }}
                  provenance: false

    merge:
        name: Merge and Push Manifest
        runs-on: ubuntu-latest
        needs: build
        timeout-minutes: 5

        permissions:
            contents: read
            packages: write

        steps:
            - name: Log in to Docker Hub
              uses: docker/login-action@v4
              with:
                  username: ${{ secrets.DOCKERHUB_USERNAME }}
                  password: ${{ secrets.DOCKERHUB_TOKEN }}

            - name: Log in to GitHub Container Registry
              uses: docker/login-action@v4
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v4

            - name: Extract metadata for Docker
              id: meta
              uses: docker/metadata-action@v6
              with:
                  images: |
                      alexazhou/gt_ai_gateway
                      ghcr.io/${{ github.repository }}
                  tags: |
                      type=semver,pattern={{version}}
                      type=semver,pattern={{major}}.{{minor}}
                      type=ref,event=branch
                      type=sha,prefix=
                      type=raw,value=latest,enable={{is_default_branch}}

            - name: Create and push manifest list
              run: |
                  tags='${{ steps.meta.outputs.tags }}'
                  main_tag=$(echo "$tags" | head -1)

                  # Create manifest list using buildx imagetools (works with remote images)
                  docker buildx imagetools create -t "$main_tag" \
                      "$main_tag-amd64" \
                      "$main_tag-arm64"

                  # Create additional tag aliases
                  for tag in $tags; do
                      if [ "$tag" != "$main_tag" ]; then
                          docker buildx imagetools create -t "$tag" \
                              "$tag-amd64" \
                              "$tag-arm64"
                      fi
                  done

            - name: Delete platform-specific tags
              run: |
                  tags='${{ steps.meta.outputs.tags }}'
                  username="${{ secrets.DOCKERHUB_USERNAME }}"
                  token="${{ secrets.DOCKERHUB_TOKEN }}"

                  for tag in $tags; do
                      if [[ "$tag" == *"ghcr.io"* ]]; then
                          continue
                      fi

                      # Delete amd64 suffix tag
                      curl -s -X DELETE \
                          -H "Authorization: Basic $(echo -n "$username:$token" | base64)" \
                          "https://hub.docker.com/v2/repositories/alexazhou/gt_ai_gateway/tags/${tag#*:}-amd64/" || true

                      # Delete arm64 suffix tag
                      curl -s -X DELETE \
                          -H "Authorization: Basic $(echo -n "$username:$token" | base64)" \
                          "https://hub.docker.com/v2/repositories/alexazhou/gt_ai_gateway/tags/${tag#*:}-arm64/" || true
                  done
